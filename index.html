<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发票详情</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
  .warn{background:#ffe6e6;color:#e63946;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:14px;border-bottom:1px solid #f5c2c2}
  .warn svg{width:18px;height:18px;flex-shrink:0}
  .box{padding:22px 20px}
  .title{text-align:center;font-size:20px;margin-bottom:14px}
  .desc{text-align:center;color:#555;font-size:15px;margin-bottom:24px}
  /* 只改这里：向下拉开距离 */
  .info-list{margin-top:20px}
  .item{display:flex;margin-bottom:14px;font-size:15px}
  .item .name{color:#999;width:82px;flex-shrink:0}
  .item .val{color:#333}
  .footer{text-align:center;color:#aaa;font-size:13px;margin-top:24px}
</style>
</head>
<body>

<div class="warn">
<svg viewBox="0 0 24 24" fill="#e63946"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
<span>此内容仅在微信内预览，访问详情请进入微信发票助手小程序</span>
</div>

<div class="box">
  <div class="title">发票信息</div>
  <div class="desc">以下信息仅为发票二维码所含信息，并不代表查验发票真伪的结果。</div>

  <div class="info-list">
    <div class="item">
      <div class="name">发票号码</div>
      <div class="val">25327000000084702876</div>
    </div>
    <div class="item">
      <div class="name">合计金额</div>
      <div class="val">¥1200000.00(含税)</div>
    </div>
    <div class="item">
      <div class="name">开票日期</div>
      <div class="val">2025.08.01</div>
    </div>
  </div>

  <div class="footer">如需查验发票真伪，请通过税务机关提供的官方渠道进行查验。</div>
</div>

<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script>
  document.querySelector('.box').onclick=function(){
    if(window.wx)wx.miniProgram.navigateTo({url:'/pages/index/index'})
  }
</script>
</body>
</html>
