<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发票信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #ffffff;
            padding: 40px 20px;
            color: #333333;
            line-height: 1.6;
        }
        h1 {
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }
        .tip-top {
            font-size: 22px;
            color: #333333;
            text-align: center;
            margin-bottom: 50px;
        }
        .info-item {
            display: flex;
            margin-bottom: 15px;
            font-size: 22px;
        }
        .info-label {
            color: #999999;
            width: 120px;
            flex-shrink: 0;
        }
        .info-value {
            color: #333333;
        }
        .tip-bottom {
            position: fixed;
            bottom: 40px;
            left: 20px;
            right: 20px;
            font-size: 18px;
            color: #999999;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>发票信息</h1>
    <div class="tip-top">
        以下信息仅为发票二维码所含信息，并不代表查验发票真伪的结果。
    </div>

    <div class="info-item">
        <div class="info-label">发票号码</div>
        <div class="info-value">25327000000084702876</div>
    </div>
    <div class="info-item">
        <div class="info-label">合计金额</div>
        <div class="info-value">¥1200000.00(含税)</div>
    </div>
    <div class="info-item">
        <div class="info-label">开票日期</div>
        <div class="info-value">2025.08.01</div>
    </div>

    <div class="tip-bottom">
        如需查验发票真伪，请通过税务机关提供的官方渠道进行查验。
    </div>
</body>
</html>
