<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发票详情</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
  html,body{height:100%}
  body{display:flex;flex-direction:column;background:#fff}

  .warn{
    background:#ffe6e6;
    color:#e63946;
    padding:12px 16px;
    font-size:14px;
    border-bottom:1px solid #f9c7c7;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .warn-icon {
    width:16px;
    height:16px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="%23e63946"></circle><path d="M11 7h2v6h-2V7z" fill="white"></path><path d="M11 15h2v2h-2z" fill="white"></path></svg>');
    background-size:cover;
    flex-shrink:0;
  }

  .main{
    flex:1;
    padding:24px 20px;
  }

  .title{
    text-align:center;
    font-size:20px;
    margin-bottom:16px;
  }

  .subtitle{
    text-align:center;
    color:#666;
    font-size:15px;
    margin-bottom:60px;
  }

  .row{
    display:flex;
    margin-bottom:16px;
    font-size:15px;
  }

  .label{
    width:80px;
    color:#999;
    flex-shrink:0;
  }

  .value{
    color:#333;
  }

  .footer{
    text-align:center;
    color:#aaa;
    font-size:13px;
    padding:10px 0 24px 0;
  }
</style>
</head>
<body>

<div class="warn">
<div class="warn-icon"></div>
此内容仅在微信内预览，访问详情请进入微信发票助手小程序
</div>

<div class="main">
  <div class="title">发票信息</div>
  <div class="subtitle">以下信息仅为发票二维码所含信息，并不代表查验发票真伪的结果。</div>

  <div class="row">
    <div class="label">发票号码</div>
    <div class="value">25327000000084702876</div>
  </div>

  <div class="row">
    <div class="label">合计金额</div>
    <div class="value">¥1200000.00(含税)</div>
  </div>

  <div class="row">
    <div class="label">开票日期</div>
    <div class="value">2025.08.01</div>
  </div>
</div>

<div class="footer">如需查验发票真伪，请通过税务机关提供的官方渠道进行查验。</div>

</body>
</html>
